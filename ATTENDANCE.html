<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Attendance Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0A0C10;
    --panel:#12151B;
    --panel-2:#171B22;
    --line:#262B34;
    --line-soft:#1D2129;
    --ink:#EDEFF3;
    --muted:#8A93A3;
    --muted-2:#5E6673;
    --accent:#4C8DFF;
    --accent-dim:rgba(76,141,255,0.14);

    --amber:#E3A548;
    --rust:#E2574C;
    --slate:#6B8DC4;
    --mauve:#B37AAA;
    --teal:#3FA88F;
    --brick:#B3706B;
    --steel:#7FA3BC;
    --deepred:#D1453A;

    --radius:10px;
  }
  *{box-sizing:border-box;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 100% -10%, rgba(76,141,255,0.06), transparent),
      var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans', system-ui, sans-serif;
    font-size:14px;
    line-height:1.45;
  }
  .wrap{ max-width:1320px; margin:0 auto; padding:32px 28px 72px; }

  /* ---- Header ---- */
  header.top{
    display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-end;
    gap:20px; margin-bottom:26px; padding-bottom:22px; border-bottom:1px solid var(--line);
  }
  .brandrow{ display:flex; align-items:center; gap:14px; }
  .mark{
    width:38px; height:38px; border-radius:8px; flex:none;
    background:linear-gradient(155deg, #4C8DFF, #2E5FCC);
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:13px; color:#fff;
    letter-spacing:-0.02em;
  }
  .brand-eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--muted-2); margin:0 0 4px;
  }
  h1{
    font-family:'Fraunces', serif; font-weight:600; font-size:27px; margin:0; color:#fff;
    letter-spacing:-0.01em;
  }
  .sub{ color:var(--muted); margin-top:5px; font-size:13px; }

  .connect-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  input[type=text], input[type=date], select, .ms-toggle{
    font-family:'IBM Plex Sans', sans-serif; font-size:13px;
    border:1px solid var(--line); border-radius:8px; padding:9px 12px;
    background:var(--panel-2); color:var(--ink);
  }
  select{ appearance:none; -webkit-appearance:none; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%238A93A3'/></svg>"); background-repeat:no-repeat; background-position:right 12px center; padding-right:30px; }
  input::placeholder{ color:var(--muted-2); }
  input[type=text]:focus, input[type=date]:focus, select:focus, button:focus-visible, .ms-toggle:focus-visible{
    outline:2px solid var(--accent); outline-offset:1px;
  }
  input[type=date]{ color-scheme:dark; }
  #apiUrl{ width:360px; }
  button{
    font-family:'IBM Plex Sans', sans-serif; font-weight:600; font-size:13px;
    border:none; border-radius:8px; padding:10px 18px; cursor:pointer;
    background:var(--accent); color:#0A0C10; transition:background .12s;
  }
  button:hover{ background:#6FA3FF; }
  button.ghost{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  button.ghost:hover{ background:var(--panel-2); }
  button.small{ padding:5px 10px; font-size:11.5px; font-weight:500; }

  /* ---- Filter bar ---- */
  .filterbar{
    display:flex; flex-wrap:wrap; gap:16px; align-items:flex-end;
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px; margin-bottom:24px;
  }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted-2); font-weight:600; }
  .filterbar .apply{ margin-left:auto; }

  /* ---- Category multiselect ---- */
  .multiselect{ position:relative; }
  .ms-toggle{ min-width:220px; text-align:left; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .ms-toggle::after{ content:''; width:10px; height:6px; flex:none;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%238A93A3'/></svg>") no-repeat center; }
  .ms-panel{
    position:absolute; top:calc(100% + 6px); left:0; z-index:20; min-width:260px;
    background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
    padding:10px; box-shadow:0 12px 32px rgba(0,0,0,0.45);
  }
  .ms-panel.hidden{ display:none; }
  .ms-option{
    display:flex; align-items:center; gap:9px; padding:7px 8px; border-radius:6px;
    font-size:13px; cursor:pointer;
  }
  .ms-option:hover{ background:rgba(255,255,255,0.04); }
  .ms-option input{ accent-color:var(--accent); }
  .ms-option .dot{ width:9px; height:9px; border-radius:50%; flex:none; }
  .ms-actions{ display:flex; gap:6px; padding:8px 4px 2px; border-top:1px solid var(--line-soft); margin-top:6px; }

  /* ---- Roll-call stamp strip (signature element) ---- */
  .stampstrip{ display:flex; flex-wrap:wrap; gap:14px; margin-bottom:24px; }
  .stamp{
    position:relative; border:1.5px solid var(--stamp-color, var(--ink));
    border-radius:10px; padding:11px 18px 9px; min-width:140px;
    color:var(--stamp-color, var(--ink)); background:var(--panel);
    transform:rotate(var(--tilt,0deg));
  }
  .stamp .n{ font-family:'IBM Plex Mono',monospace; font-size:26px; font-weight:600; line-height:1; }
  .stamp .lbl{ font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; margin-top:4px; font-weight:600; color:var(--muted); }

  /* ---- Charts ---- */
  .chartrow{ display:grid; grid-template-columns:1fr 1.4fr; gap:14px; margin-bottom:24px; }
  @media (max-width:860px){ .chartrow{ grid-template-columns:1fr; } }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px; }
  .panel h2{ font-family:'Fraunces',serif; font-size:16px; font-weight:600; margin:0 0 16px; color:#fff; }
  .chart-holder{ position:relative; height:230px; }

  /* ---- Table ---- */
  .tablewrap{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .tableheader{ display:flex; justify-content:space-between; align-items:center; gap:12px; padding:18px 22px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .tableheader h2{ font-family:'Fraunces',serif; font-size:16px; font-weight:600; margin:0; color:#fff; }
  .colfilters{
    display:grid; grid-template-columns:1.3fr 1fr 1.2fr 1.2fr; gap:12px;
    padding:16px 22px; background:var(--panel-2); border-bottom:1px solid var(--line);
  }
  @media (max-width:760px){ .colfilters{ grid-template-columns:1fr 1fr; } }
  .colfilters input, .colfilters select{ width:100%; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  thead th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em;
    color:var(--muted-2); padding:11px 22px; border-bottom:1px solid var(--line); cursor:pointer;
    white-space:nowrap; user-select:none; background:var(--panel-2);
  }
  thead th:hover{ color:var(--ink); }
  tbody td{ padding:11px 22px; border-bottom:1px solid var(--line-soft); color:var(--ink); }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:rgba(255,255,255,0.025); }
  td.name{ font-weight:500; }
  td.payroll{ font-family:'IBM Plex Mono',monospace; color:var(--muted); }
  .catpill{
    display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600;
    color:#0A0C10; font-family:'IBM Plex Mono',monospace;
  }
  .pager{ display:flex; justify-content:space-between; align-items:center; padding:15px 22px; }
  .pager button{ background:transparent; color:var(--ink); border:1px solid var(--line); }
  .pager button:disabled{ opacity:.35; cursor:not-allowed; }

  .empty, .loading, .errorbox{ padding:44px 20px; text-align:center; color:var(--muted); }
  .errorbox{ color:var(--rust); font-family:'IBM Plex Mono',monospace; font-size:12.5px; white-space:pre-wrap; text-align:left; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brandrow">
      <div class="mark">HR</div>
      <div>
        <p class="brand-eyebrow">HR Operations</p>
        <h1>Staff Attendance Register</h1>
      </div>
    </div>
    <div class="connect-row">
      <input type="text" id="apiUrl" placeholder="Paste your Apps Script Web App URL">
      <button id="connectBtn">Connect</button>
      <button class="ghost" id="forgetBtn" title="Clear the saved URL">Forget</button>
    </div>
  </header>
  <p class="sub" id="subtitle" style="margin-top:-14px;margin-bottom:24px;">Connect the dashboard to your Kobo-linked sheet to begin.</p>

  <section class="filterbar" id="filterbar" style="display:none;">
    <div class="field">
      <label for="startDate">From</label>
      <input type="date" id="startDate">
    </div>
    <div class="field">
      <label for="endDate">To</label>
      <input type="date" id="endDate">
    </div>
    <div class="field">
      <label for="branchSelect">Branch</label>
      <select id="branchSelect"><option value="ALL">All branches</option></select>
    </div>
    <div class="field">
      <label>Category</label>
      <div class="multiselect" id="categoryMultiselect">
        <button type="button" class="ms-toggle" id="categoryToggle">All categories</button>
        <div class="ms-panel hidden" id="categoryPanel"></div>
      </div>
    </div>
    <button class="apply" id="applyBtn">Apply filters</button>
  </section>

  <section class="stampstrip" id="stampStrip"></section>

  <section class="chartrow" id="chartRow" style="display:none;">
    <div class="panel">
      <h2>By category</h2>
      <div class="chart-holder"><canvas id="categoryChart"></canvas></div>
    </div>
    <div class="panel">
      <h2>Trend over time</h2>
      <div class="chart-holder"><canvas id="trendChart"></canvas></div>
    </div>
  </section>

  <section class="tablewrap" id="tableSection" style="display:none;">
    <div class="tableheader">
      <h2>Records</h2>
    </div>
    <div class="colfilters">
      <div class="field">
        <label for="filterName">Name</label>
        <input type="text" id="filterName" placeholder="Filter by name">
      </div>
      <div class="field">
        <label for="filterPayroll">Payroll #</label>
        <input type="text" id="filterPayroll" placeholder="Filter by payroll #">
      </div>
      <div class="field">
        <label for="filterCategory">Category</label>
        <select id="filterCategory"><option value="ALL">All categories</option></select>
      </div>
      <div class="field">
        <label for="filterBranch">Branch</label>
        <select id="filterBranch"><option value="ALL">All branches</option></select>
      </div>
    </div>
    <div id="tableBody"></div>
  </section>

  <div class="loading hidden" id="loadingState">Loading records…</div>
  <div class="empty hidden" id="emptyState">No records match the current filters.</div>
  <div class="errorbox hidden" id="errorState"></div>

</div>

<script>
const STORAGE_KEY = 'hrDashboardApiUrl';

function saveApiUrl(url){
  try { localStorage.setItem(STORAGE_KEY, url); } catch (e) { /* storage unavailable, e.g. sandboxed preview */ }
}
function loadSavedApiUrl(){
  try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; }
}
function clearSavedApiUrl(){
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
}

const CATEGORY_COLORS = {
  ABSENT_ON_PERMISSION: '#E3A548',
  ABSENT_WITHOUT_PERMISSION: '#E2574C',
  ON_SICK_LEAVE: '#6B8DC4',
  ON_MATERNITY_LEAVE: '#B37AAA',
  ANNUAL_LEAVE: '#3FA88F',
  RESIGNED_TERMINATED: '#B3706B',
  TRANSFERRED: '#7FA3BC',
  ON_SUSPENSION: '#D1453A'
};
const TILTS = [-3, 2, -1.5, 3, -2.5, 1.5, -1, 2.5];
const AXIS_COLOR = '#8A93A3';
const GRID_COLOR = 'rgba(255,255,255,0.06)';

let apiUrl = '';
let meta = null;
let currentRecords = [];
let sortState = { col: 'date', dir: 'desc' };
let page = 0;
const PAGE_SIZE = 25;
let categoryChart = null;
let trendChart = null;

const els = {
  apiUrlInput: document.getElementById('apiUrl'),
  connectBtn: document.getElementById('connectBtn'),
  subtitle: document.getElementById('subtitle'),
  filterbar: document.getElementById('filterbar'),
  startDate: document.getElementById('startDate'),
  endDate: document.getElementById('endDate'),
  branchSelect: document.getElementById('branchSelect'),
  categoryToggle: document.getElementById('categoryToggle'),
  categoryPanel: document.getElementById('categoryPanel'),
  applyBtn: document.getElementById('applyBtn'),
  stampStrip: document.getElementById('stampStrip'),
  chartRow: document.getElementById('chartRow'),
  tableSection: document.getElementById('tableSection'),
  tableBody: document.getElementById('tableBody'),
  filterName: document.getElementById('filterName'),
  filterPayroll: document.getElementById('filterPayroll'),
  filterCategory: document.getElementById('filterCategory'),
  filterBranch: document.getElementById('filterBranch'),
  loadingState: document.getElementById('loadingState'),
  emptyState: document.getElementById('emptyState'),
  errorState: document.getElementById('errorState')
};

function fmtDate(d){ return d.toISOString().slice(0,10); }

function setDefaultDates(){
  const end = new Date();
  const start = new Date();
  start.setDate(start.getDate() - 30);
  els.startDate.value = fmtDate(start);
  els.endDate.value = fmtDate(end);
}

function showState(state){
  els.loadingState.classList.add('hidden');
  els.emptyState.classList.add('hidden');
  els.errorState.classList.add('hidden');
  if (state) document.getElementById(state).classList.remove('hidden');
}

els.connectBtn.addEventListener('click', function(){
  const url = els.apiUrlInput.value.trim();
  if (!url){ return; }
  apiUrl = url;
  saveApiUrl(url);
  setDefaultDates();
  loadMeta();
});

document.getElementById('forgetBtn').addEventListener('click', function(){
  clearSavedApiUrl();
  apiUrl = '';
  els.apiUrlInput.value = '';
  els.subtitle.textContent = 'Saved URL cleared. Paste a new one and click Connect.';
  els.filterbar.style.display = 'none';
});

// ---- Auto-reconnect using a previously saved URL ----
(function tryAutoReconnect(){
  const saved = loadSavedApiUrl();
  if (saved){
    els.apiUrlInput.value = saved;
    apiUrl = saved;
    setDefaultDates();
    els.subtitle.textContent = 'Reconnecting with your saved URL…';
    loadMeta();
  }
})();

els.applyBtn.addEventListener('click', function(){ page = 0; loadData(); });
els.filterName.addEventListener('input', function(){ page = 0; renderTable(); });
els.filterPayroll.addEventListener('input', function(){ page = 0; renderTable(); });
els.filterCategory.addEventListener('change', function(){ page = 0; renderTable(); });
els.filterBranch.addEventListener('change', function(){ page = 0; renderTable(); });

// ---- Category dropdown behavior ----
els.categoryToggle.addEventListener('click', function(e){
  e.stopPropagation();
  els.categoryPanel.classList.toggle('hidden');
});
document.addEventListener('click', function(e){
  if (!els.categoryPanel.contains(e.target) && e.target !== els.categoryToggle){
    els.categoryPanel.classList.add('hidden');
  }
});

function updateCategoryToggleLabel(){
  const total = meta.categories.length;
  const selected = getSelectedCategories().length;
  els.categoryToggle.textContent = selected === total ? 'All categories' : `${selected} of ${total} categories`;
}

function getSelectedCategories(){
  return Array.from(els.categoryPanel.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value);
}

async function loadMeta(){
  showState('loadingState');
  els.filterbar.style.display = 'none';
  try{
    const res = await fetch(apiUrl);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    meta = json.meta;

    els.branchSelect.innerHTML = '<option value="ALL">All branches</option>' +
      meta.branches.map(b => `<option value="${escapeAttr(b)}">${escapeHtml(b)}</option>`).join('');

    els.filterBranch.innerHTML = '<option value="ALL">All branches</option>' +
      meta.branches.map(b => `<option value="${escapeAttr(b)}">${escapeHtml(b)}</option>`).join('');

    els.filterCategory.innerHTML = '<option value="ALL">All categories</option>' +
      meta.categories.map(c => `<option value="${c.key}">${escapeHtml(c.label)}</option>`).join('');

    els.categoryPanel.innerHTML = meta.categories.map(c => `
      <label class="ms-option">
        <input type="checkbox" value="${c.key}" checked>
        <span class="dot" style="background:${CATEGORY_COLORS[c.key]};"></span>
        ${escapeHtml(c.label)}
      </label>
    `).join('') + `
      <div class="ms-actions">
        <button type="button" class="ghost small" id="catAll">Select all</button>
        <button type="button" class="ghost small" id="catNone">Clear</button>
      </div>`;

    els.categoryPanel.querySelectorAll('input[type=checkbox]').forEach(cb => {
      cb.addEventListener('change', updateCategoryToggleLabel);
    });
    document.getElementById('catAll').addEventListener('click', () => {
      els.categoryPanel.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
      updateCategoryToggleLabel();
    });
    document.getElementById('catNone').addEventListener('click', () => {
      els.categoryPanel.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
      updateCategoryToggleLabel();
    });
    updateCategoryToggleLabel();

    els.filterbar.style.display = 'flex';
    els.subtitle.textContent = 'Connected — showing the last 30 days across all branches.';
    loadData();
  } catch(err){
    showState('errorState');
    els.errorState.textContent = 'Could not connect to the API.\n\n' + err.message +
      '\n\nCheck that:\n- The URL is the full "Web app URL" from Deploy > Manage deployments\n- The deployment access is set to "Anyone"\n- The URL was pasted in full, with no extra spaces';
  }
}

async function loadData(){
  showState('loadingState');
  els.chartRow.style.display = 'none';
  els.tableSection.style.display = 'none';
  els.stampStrip.innerHTML = '';
  els.categoryPanel.classList.add('hidden');

  const cats = getSelectedCategories();
  if (cats.length === 0){
    showState('emptyState');
    els.emptyState.textContent = 'Select at least one category to see results.';
    return;
  }

  const qs = new URLSearchParams({
    startDate: els.startDate.value,
    endDate: els.endDate.value,
    branch: els.branchSelect.value,
    categories: cats.join(',')
  });

  try{
    const res = await fetch(apiUrl + '?' + qs.toString());
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    currentRecords = json.records;
    renderStamps(json.summary);
    renderCharts(json.summary);
    page = 0;
    renderTable();

    els.chartRow.style.display = 'grid';
    els.tableSection.style.display = 'block';

    showState(currentRecords.length === 0 ? 'emptyState' : null);
  } catch(err){
    showState('errorState');
    els.errorState.textContent = 'Could not load data.\n\n' + err.message;
  }
}

function renderStamps(summary){
  els.stampStrip.innerHTML = meta.categories.map((c, i) => {
    const count = summary.byCategory[c.key] || 0;
    const color = CATEGORY_COLORS[c.key];
    return `<div class="stamp" style="--stamp-color:${color}; --tilt:${TILTS[i % TILTS.length]}deg;">
      <div class="n">${count}</div>
      <div class="lbl">${escapeHtml(c.label)}</div>
    </div>`;
  }).join('');
}

function renderCharts(summary){
  const catCtx = document.getElementById('categoryChart');
  const catLabels = meta.categories.map(c => c.label);
  const catData = meta.categories.map(c => summary.byCategory[c.key] || 0);
  const catColors = meta.categories.map(c => CATEGORY_COLORS[c.key]);

  if (categoryChart) categoryChart.destroy();
  categoryChart = new Chart(catCtx, {
    type: 'bar',
    data: { labels: catLabels, datasets: [{ data: catData, backgroundColor: catColors, borderRadius: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: AXIS_COLOR, font: { size: 10 }, autoSkip: false, maxRotation: 40, minRotation: 30 }, grid: { display:false } },
        y: { beginAtZero: true, ticks: { color: AXIS_COLOR, precision: 0 }, grid: { color: GRID_COLOR } }
      }
    }
  });

  const trendCtx = document.getElementById('trendChart');
  const trendLabels = summary.byDate.map(d => d.date);
  const trendData = summary.byDate.map(d => d.total);

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(trendCtx, {
    type: 'line',
    data: {
      labels: trendLabels,
      datasets: [{
        data: trendData, borderColor: '#4C8DFF', backgroundColor: 'rgba(76,141,255,0.12)',
        fill: true, tension: 0.25, pointRadius: 2, pointBackgroundColor: '#4C8DFF'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: AXIS_COLOR }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { color: AXIS_COLOR, precision: 0 }, grid: { color: GRID_COLOR } }
      }
    }
  });
}

function sortRecords(records){
  const { col, dir } = sortState;
  return [...records].sort((a, b) => {
    let av = a[col], bv = b[col];
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

function renderTable(){
  const nameQ = els.filterName.value.trim().toLowerCase();
  const payrollQ = els.filterPayroll.value.trim().toLowerCase();
  const catQ = els.filterCategory.value;
  const branchQ = els.filterBranch.value;

  let filtered = currentRecords.filter(r => {
    if (nameQ && !String(r.name).toLowerCase().includes(nameQ)) return false;
    if (payrollQ && !String(r.payroll).toLowerCase().includes(payrollQ)) return false;
    if (catQ !== 'ALL' && r.category !== catQ) return false;
    if (branchQ !== 'ALL' && r.branch !== branchQ) return false;
    return true;
  });
  filtered = sortRecords(filtered);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  page = Math.min(page, totalPages - 1);
  const pageRows = filtered.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

  const arrow = (col) => sortState.col === col ? (sortState.dir === 'asc' ? ' ▲' : ' ▼') : '';

  let html = `<table>
    <thead><tr>
      <th data-col="name">Name${arrow('name')}</th>
      <th data-col="payroll">Payroll #${arrow('payroll')}</th>
      <th data-col="categoryLabel">Category${arrow('categoryLabel')}</th>
      <th data-col="branch">Branch${arrow('branch')}</th>
      <th data-col="date">Date${arrow('date')}</th>
    </tr></thead>
    <tbody>`;

  if (pageRows.length === 0){
    html += `<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:26px;">No matching records.</td></tr>`;
  } else {
    pageRows.forEach(r => {
      const color = CATEGORY_COLORS[r.category] || '#666';
      html += `<tr>
        <td class="name">${escapeHtml(r.name)}</td>
        <td class="payroll">${escapeHtml(r.payroll)}</td>
        <td><span class="catpill" style="background:${color};">${escapeHtml(r.categoryLabel)}</span></td>
        <td>${escapeHtml(r.branch)}</td>
        <td>${escapeHtml(r.date)}</td>
      </tr>`;
    });
  }
  html += `</tbody></table>
    <div class="pager">
      <span style="color:var(--muted);font-size:12px;">${filtered.length} record${filtered.length === 1 ? '' : 's'} · page ${page+1} of ${totalPages}</span>
      <div style="display:flex;gap:8px;">
        <button class="ghost" id="prevPage" ${page === 0 ? 'disabled' : ''}>Previous</button>
        <button class="ghost" id="nextPage" ${page >= totalPages - 1 ? 'disabled' : ''}>Next</button>
      </div>
    </div>`;

  els.tableBody.innerHTML = html;

  els.tableBody.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortState.col === col){ sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc'; }
      else { sortState.col = col; sortState.dir = 'asc'; }
      renderTable();
    });
  });
  const prevBtn = document.getElementById('prevPage');
  const nextBtn = document.getElementById('nextPage');
  if (prevBtn) prevBtn.addEventListener('click', () => { page--; renderTable(); });
  if (nextBtn) nextBtn.addEventListener('click', () => { page++; renderTable(); });
}

function escapeHtml(v){
  return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(v){ return escapeHtml(v); }
</script>
</body>
</html>
