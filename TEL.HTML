<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Branch and Telesale Performance </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
    background: #0f172a;
    color: #e5e7eb;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px;
    text-align: center;
    font-size: 28px;
    background: #ba9305;
    color: #020617;
  }

  /* New Filter Bar Styles */
  #filterContainer {
    background: #1e293b;
    padding: 12px 20px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
    border-bottom: 2px solid #334155;
  }

  #filterContainer label {
    color: #93c5fd;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #branchFilter {
    padding: 8px 12px;
    background: #0f172a;
    color: #e5e7eb;
    border: 1px solid #475569;
    border-radius: 4px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    min-width: 200px;
  }

  #branchFilter:focus {
    outline: none;
    border-color: #ba9305;
  }

  .container {
    flex: 1;
    padding: 0 20px;
    overflow: hidden;
  }

  .table-container {
    height: 100%;
    overflow-y: auto;
    scrollbar-width: none;
  }

  .table-container::-webkit-scrollbar {
    display: none;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    font-size: 24px;
  }

  thead th {
    position: sticky;
    top: 0;
    background: #1e293b;
    color: #93c5fd;
    text-transform: uppercase;
    font-size: 15px;
    z-index: 2;
  }

  th,
  td {
    padding: 14px;
    border-bottom: 1px solid #334155;
    text-align: left;
    vertical-align: middle;
  }

  th:nth-child(1), td:nth-child(1) { width: 70px; text-align: center; }
  th:nth-child(2), td:nth-child(2) { width: 35%; }
  th:nth-child(3), td:nth-child(3) { width: 25%; }
  th:nth-child(4), td:nth-child(4) { width: 20%; text-align: center; }
  th:nth-child(5), td:nth-child(5) { width: 20%; text-align: center; }

  tbody tr:nth-child(even) {
    background: #020617;
  }

  tbody tr:hover {
    background: #1e293b;
  }

  .high { color: #2563eb; }
  .medium { color: #facc15; }
  .low { color: #ef4444; }

  .rank {
    color: #38bdf8;
    font-weight: bold;
    width: 60px;
  }

  footer {
    text-align: center;
    padding: 10px;
    font-size: 14px;
    background: #f8fafc;
    color: #020617;
  }

  #branchStats {
    background: #1e293b;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px 15px;
    font-size: 22px;
    font-weight: bold;
    gap: 12px;
  }

  #branchStats .perf-label {
    color: #93c5fd;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #branchStats .perf-value {
    font-size: 32px;
  }

  .perf-high { color: #22c55e; }
  .perf-medium { color: #facc15; }
  .perf-low { color: #ef4444; }

</style>
</head>

<body>

<header>Live Telesales Performance</header>

<!-- Branch Filter Dropdown -->
<div id="filterContainer">
  <label for="branchFilter">Filter by Branch:</label>
  <select id="branchFilter">
    <option value="">All Branches</option>
    <!-- Options will be populated by JavaScript -->
  </select>
</div>

<div id="branchStats"></div>

<div class="container">
  <div class="table-container" id="scrollContainer">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Telesale Name</th>
          <th>Branch</th>
          <th>Sales (%)</th>
          <th>Customer Orders</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="5">Loading data…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  Last updated: <span id="lastUpdated"></span><br>
  Designed and Managed by MIS.DPT
</footer>

<script src="config.js"></script>

<script>
    let scrollInterval = null;
    let pauseTimeout = null;

    let today = new Date();
    let yyyy = today.getFullYear();
    let mm = String(today.getMonth() + 1).padStart(2, '0');
    let dd = String(today.getDate()).padStart(2, '0');
    let formattedEnd = `${yyyy}-${mm}-${dd}`;

    let pastDate = new Date();
    pastDate.setDate(today.getDate() - 7);
    let pastY = pastDate.getFullYear();
    let pastM = String(pastDate.getMonth() + 1).padStart(2, '0');
    let pastD = String(pastDate.getDate()).padStart(2, '0');
    let formattedStart = `${pastY}-${pastM}-${pastD}`;

    // Initialize from URL parameter, default to empty string ("All Branches")
    const urlParams = new URLSearchParams(window.location.search);
    let currentBranchId = urlParams.get("branch") || "";

    const branchNames = {
        "orgbranch-683976e3994a072a600cbd7a": "Head Office",
        "orgbranch-684558f576bd774c32f00d8e": "Naivasha",
        "orgbranch-68455bea76bd774c32f031cc": "Kitengela",
        "orgbranch-68458a4b76bd774c32f10527": "Githu Pharma",
        "orgbranch-684593b176bd774c32f150c6": "Kawangware Wholesale",
        "orgbranch-685001107d3c6f75c8c1d42e": "Karatina",
        "orgbranch-685001217d3c6f75c8c1d491": "Meru",
        "orgbranch-6850012f7d3c6f75c8c1d4f4": "Busia",
        "orgbranch-685001387d3c6f75c8c1d557": "Mombasa Wholesale",
        "orgbranch-685001457d3c6f75c8c1d5ba": "Kisii",
        "orgbranch-685001557d3c6f75c8c1d61d": "Philton",
        "orgbranch-6850015d7d3c6f75c8c1d680": "Kitui Wholesale",
        "orgbranch-685001667d3c6f75c8c1d6e3": "Malindi",
        "orgbranch-685001967d3c6f75c8c1d746": "Kericho",
        "orgbranch-6850019e7d3c6f75c8c1d7a9": "Nakuru",
        "orgbranch-685001a77d3c6f75c8c1d80c": "Kisumu",
        "orgbranch-685001b17d3c6f75c8c1d86f": "Eldoret",
        "orgbranch-685001c17d3c6f75c8c1d8d2": "Thika",
        "orgbranch-685001ce7d3c6f75c8c1d935": "Voi",
        "orgbranch-685001e27d3c6f75c8c1d998": "Kendia",
        "orgbranch-685001f37d3c6f75c8c1d9fb": "Kakamega",
        "orgbranch-685001ff7d3c6f75c8c1da5e": "Bungoma",
        "orgbranch-685002097d3c6f75c8c1dac1": "Makindu",
        "orgbranch-685002137d3c6f75c8c1db4f": "Rongai Wholesale",
        "orgbranch-685002247d3c6f75c8c1dc25": "Embu"
    };

    const branchTargets = {
        "orgbranch-683976e3994a072a600cbd7a": 9555462,
        "orgbranch-684558f576bd774c32f00d8e": 840599,
        "orgbranch-68455bea76bd774c32f031cc": 1648410,
        "orgbranch-68458a4b76bd774c32f10527": 2293279,
        "orgbranch-684593b176bd774c32f150c6": 2557170,
        "orgbranch-685001107d3c6f75c8c1d42e": 1539617,
        "orgbranch-685001217d3c6f75c8c1d491": 2789834,
        "orgbranch-6850012f7d3c6f75c8c1d4f4": 1104974,
        "orgbranch-685001387d3c6f75c8c1d557": 3187525,
        "orgbranch-685001457d3c6f75c8c1d5ba": 3633705,
        "orgbranch-685001557d3c6f75c8c1d61d": 1789168,
        "orgbranch-6850015d7d3c6f75c8c1d680": 1395065,
        "orgbranch-685001667d3c6f75c8c1d6e3": 1597460,
        "orgbranch-685001967d3c6f75c8c1d746": 1608257,
        "orgbranch-6850019e7d3c6f75c8c1d7a9": 2000000,
        "orgbranch-685001a77d3c6f75c8c1d80c": 1382655,
        "orgbranch-685001b17d3c6f75c8c1d86f": 2838928,
        "orgbranch-685001c17d3c6f75c8c1d8d2": 1104378,
        "orgbranch-685001ce7d3c6f75c8c1d935": 804269,
        "orgbranch-685001e27d3c6f75c8c1d998": 997747,
        "orgbranch-685001f37d3c6f75c8c1d9fb": 1544541,
        "orgbranch-685001ff7d3c6f75c8c1da5e": 1102352,
        "orgbranch-685002097d3c6f75c8c1dac1": 1247065,
        "orgbranch-685002137d3c6f75c8c1db4f": 710690,    
        "orgbranch-685002247d3c6f75c8c1dc25": 1228095
    };

    const API_TOKEN = window.API_CONFIG.API_TOKEN;

    /* ================= POPULATE DROPDOWN & HANDLE FILTER ================= */
    function populateBranchDropdown() {
        const dropdown = document.getElementById("branchFilter");
        dropdown.innerHTML = '<option value="">All Branches</option>'; // Reset options

        for (const id in branchNames) {
            const option = document.createElement("option");
            option.value = id;
            option.textContent = branchNames[id];
            dropdown.appendChild(option);
        }

        // Set initial value if URL parameter was provided
        dropdown.value = currentBranchId;
    }

    function updateHeader() {
        const displayName = currentBranchId 
            ? (branchNames[currentBranchId] || currentBranchId) 
            : "All Branches";
        document.querySelector("header").textContent = `Live Telesales Performance — ${displayName}`;
    }

    // Event listener for dropdown change
    document.getElementById("branchFilter").addEventListener("change", function() {
        currentBranchId = this.value;
        updateHeader();
        loadAllPages(); // Fetch new data immediately upon filter change
    });

    /* ================= AUTO SCROLL ================= */
    function startAutoScroll() {
      const c = document.getElementById("scrollContainer");

      if (scrollInterval) clearInterval(scrollInterval);
      if (pauseTimeout) clearTimeout(pauseTimeout);

      if (c.scrollHeight <= c.clientHeight) return;

      let direction = 1;   // 1 = down, -1 = up
      let isPaused = false;

      scrollInterval = setInterval(() => {
        if (isPaused) return;

        c.scrollTop += direction * 2;

        if (c.scrollTop >= c.scrollHeight - c.clientHeight && direction === 1) {
          c.scrollTop = c.scrollHeight - c.clientHeight;
          isPaused = true;
          pauseTimeout = setTimeout(() => {
            direction = -1;
            isPaused = false;
          }, 5000);
        }

        if (c.scrollTop <= 0 && direction === -1) {
          c.scrollTop = 0;
          isPaused = true;
          pauseTimeout = setTimeout(() => {
            direction = 1;
            isPaused = false;
          }, 5000);
        }
      }, 30);
    }

    /* ================= FETCH ================= */
    async function fetchPage(pageNum, baseUrl) {
      const response = await fetch(`${baseUrl}&pageNum=${pageNum}`, {
        headers: {
          "Authorization": API_TOKEN,
          "Content-Type": "application/json"
        }
      });

      if (!response.ok) {
        throw new Error("HTTP " + response.status);
      }

      return await response.json();
    }

    /* ================= LOAD ALL DATA ================= */
    async function loadAllPages() {
      try {
        // Construct API URL dynamically based on the CURRENTLY selected branch
        let BASE_API = `${window.API_CONFIG.API_URL}sales-person-performance?pageSize=500&endDate=${formattedEnd}`;
        if (currentBranchId) {
            BASE_API += `&orgBranchId=${currentBranchId}`;
        }

        let allData = [];

        const firstResponse = await fetchPage(0, BASE_API);
        const pageCount = firstResponse.pageCount || 1;
        allData.push(...(firstResponse.data || []));

        const promises = [];
        for (let i = 1; i < pageCount; i++) {
          promises.push(fetchPage(i, BASE_API));
        }

        const responses = await Promise.all(promises);
        responses.forEach(res => {
          allData.push(...(res.data || [])); 
        });

        // Calculate Branch Performance
        const totalNetSales = allData.reduce(
            (sum, r) => sum + Number(r.netDailySales || 0),
            0
        );

        // Calculate Target based on dynamically selected branch
        let target = 0;
        if (currentBranchId) {
            target = branchTargets[currentBranchId] || 0;
        } else {
            for (const id in branchTargets) {
                target += branchTargets[id];
            }
        }

        const performance = target > 0 ? (totalNetSales / target) * 100 : 0;

        const perfClass =
            performance >= 80 ? "perf-high" :
            performance >= 50 ? "perf-medium" :
            "perf-low";

        document.getElementById("branchStats").innerHTML = `
            <span class="perf-label">Branch Performance</span>
            <span class="perf-value ${perfClass}">${performance.toFixed(1)}%</span>
        `;

        /* ================= PROCESS ================= */
        const processed = allData
          .map(d => {
            let score = d.dailySalesScore;
            if (typeof score === "string") {
              score = score.replace("%", "");
            }
            score = Number(score);
            return { ...d, score };
          })
          .filter(d => !isNaN(d.score) && d.score > 0)
          .sort((a, b) => b.score - a.score);

        renderTable(processed);

        document.getElementById("lastUpdated").textContent = new Date().toLocaleTimeString();

      } catch (err) {
        console.error(err);
        document.getElementById("tableBody").innerHTML =
          `<tr><td colspan="5">Failed to load data</td></tr>`;
      }
    }

    /* ================= RENDER ================= */
    function renderTable(data) {
      const tbody = document.getElementById("tableBody");

      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="5">No sales Data Available</td></tr>`;
        return;
      }

      tbody.innerHTML = "";

      data.forEach((item, index) => {
        const sales = item.score;
        const orders = Number(item.totalDaysCustomers || 0);
        const cls = sales >= 80 ? "high" : sales >= 50 ? "medium" : "low";

        tbody.innerHTML += `
          <tr>
            <td class="rank">${index + 1}</td>
            <td>${item.salesPersonName}</td>
            <td>${item.branchName}</td>
            <td class="${cls}">${sales.toFixed(1)}%</td>
            <td>${orders}</td>
          </tr>
        `;
      });

      document.getElementById("scrollContainer").scrollTop = 0;
      startAutoScroll();
    }

    /* ================= INIT ================= */
    populateBranchDropdown();
    updateHeader();
    loadAllPages();
    setInterval(loadAllPages, 30000);
</script>

</body>
</html>
