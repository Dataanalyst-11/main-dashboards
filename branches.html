<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Branch Compliance Dashboard</title>

<style>
  :root {
    --header-height: 0px;
  }

  body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding-top: var(--header-height);
  }

  /* ===== FIXED DASHBOARD HEADER ===== */
  .dashboard-header {
    position: fixed;
    top: 0;
    width: 100%;
    background: #f4f6f9;
    z-index: 1000;
    padding: 15px 0 10px;
    text-align: center;
    border-bottom: 1px solid #ddd;
  }

  .dashboard-header h2 {
    margin: 0;
  }

  #clock {
    font-size: 1rem;
    margin-top: 6px;
    color: #2c3e50;
    font-weight: bold;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }

  th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
    font-weight: bold;
  }

  th {
    background: #1f4e79;
    color: white;
    position: sticky;
    top: var(--header-height); /* PERFECT ALIGNMENT */
    z-index: 500;
  }

  tr:nth-child(even) {
    background: #f9f9f9;
  }

  tr:hover {
    background: #eef;
  }

  .footer {
    text-align: center;
    font-size: 0.6em;
    margin: 10px 0;
    color: gray;
  }

  html {
    scroll-behavior: auto;
  }
</style>
</head>

<body>

<!-- FIXED HEADER -->
<div class="dashboard-header" id="dashboardHeader">
  <h2>Branch Compliance Dashboard</h2>
  <div id="clock"></div>
</div>

<table>
  <thead>
    <tr>
      <th>Branch</th>
      <th>Printed Invoices</th>
      <th>In Store</th>
      <th>Pending Confirmation</th>
      <th>In Confirmation</th>
      <th>Pending Dispatch</th>
      <th>Pending Clearance</th>
    </tr>
  </thead>
  <tbody id="dataBody"></tbody>
</table>

<div class="footer">
  Last updated: <span id="lastUpdated"></span>
  <div>Designed and Managed by MIS.DPT</div>
</div>

<script src="config.js"></script>

<script>
/* ===============================
   SET HEADER HEIGHT DYNAMICALLY
   =============================== */
function setHeaderHeight() {
  const header = document.getElementById("dashboardHeader");
  const height = header.offsetHeight;
  document.documentElement.style.setProperty(
    "--header-height",
    `${height}px`
  );
}

window.addEventListener("load", setHeaderHeight);
window.addEventListener("resize", setHeaderHeight);

/* ===============================
   LIVE CLOCK
   =============================== */
function updateClock() {
  const now = new Date();

  const date = now.toLocaleDateString(undefined, {
    weekday: "short",
    year: "numeric",
    month: "short",
    day: "numeric"
  });

  const time = now.toLocaleTimeString(undefined, {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  document.getElementById("clock").textContent =
    `${date} | ${time}`;
}

updateClock();
setInterval(updateClock, 1000);

/* ===============================
   DATE RANGE (LAST 30 DAYS)
   =============================== */
const today = new Date();
const end = today.toISOString().split("T")[0];
const past = new Date();
past.setDate(today.getDate() - 29);
const start = past.toISOString().split("T")[0];

const API_URL =
  window.API_CONFIG.API_URL +
  `invoice-count-by-status?startDate=${start}&endDate=${end}`;

const API_TOKEN = window.API_CONFIG.API_TOKEN;

/* ===============================
   LOAD DASHBOARD DATA
   =============================== */
async function loadDashboard() {
  const scrollPos = window.scrollY;

  try {
    const res = await fetch(API_URL, {
      headers: {
        "Authorization": API_TOKEN,
        "Content-Type": "application/json"
      }
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const { data } = await res.json();
    const tbody = document.getElementById("dataBody");
    tbody.innerHTML = "";

    data.forEach(b => {
      const row = document.createElement("tr");
      [
        b.BRANCH_NAME,
        b.ORDER_POSTED,
        b.STORE_CHECKED_IN,
        b.STORE_CHECKED_OUT,
        b.ITEM_CONFIRMATION,
        b.PENDING_DISPATCH,
        b.IN_TRANSIT
      ].forEach(val => {
        const td = document.createElement("td");
        td.textContent = val ?? 0;
        row.appendChild(td);
      });
      tbody.appendChild(row);
    });

    document.getElementById("lastUpdated").textContent =
      new Date().toLocaleString();

  } catch (err) {
    console.error("Data load failed:", err);
  }

  requestAnimationFrame(() => window.scrollTo(0, scrollPos));
}

loadDashboard();
setInterval(loadDashboard, 60000);
</script>

<script>
/* ===============================
   AUTO SCROLL WITH PAUSES
   =============================== */
let direction = 1;
let speed = 0.4;
let paused = false;

const TOP_PAUSE = 5000;
const BOTTOM_PAUSE = 3000;

function pauseScroll(ms) {
  paused = true;
  setTimeout(() => paused = false, ms);
}

function autoScroll() {
  if (!paused) {
    const maxScroll =
      document.documentElement.scrollHeight - window.innerHeight;

    const next = window.scrollY + direction * speed;

    if (next >= maxScroll) {
      direction = -1;
      pauseScroll(BOTTOM_PAUSE);
    } else if (next <= 0) {
      direction = 1;
      pauseScroll(TOP_PAUSE);
    } else {
      window.scrollTo(0, next);
    }
  }
  requestAnimationFrame(autoScroll);
}

requestAnimationFrame(autoScroll);
</script>

</body>
</html>
