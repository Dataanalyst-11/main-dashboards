<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Performance Less Than 50%</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
    background: #0f172a;
    color: #e5e7eb;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px;
    text-align: center;
    font-size: 28px;
    background: #ba9305;
    color: #020617;
  }

  .container {
    flex: 1;
    padding: 0 20px;
    overflow: hidden;
  }

  .table-container {
    height: 100%;
    overflow-y: auto;
    scrollbar-width: none;
  }

  .table-container::-webkit-scrollbar {
    display: none;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 24px;
  }

  thead th {
    position: sticky;
    top: 0;
    background: #1e293b;
    color: #93c5fd;
    text-transform: uppercase;
    font-size: 15px;
  }

  th, td {
    padding: 14px;
    border-bottom: 1px solid #334155;
  }

  tbody tr:nth-child(even) {
    background: #020617;
  }

  tbody tr:hover {
    background: #1e293b;
  }

  .high { color: #2563eb; }
  .medium { color: #facc15; }
  .low { color: #ef4444; }

  .rank {
    color: #38bdf8;
    font-weight: bold;
    width: 60px;
  }

  footer {
    text-align: center;
    padding: 10px;
    font-size: 14px;
    background: #f8fafc;
    color: #020617;
  }
</style>
</head>

<body>

<header>
 Telesales Performance Less Than 50%
</header>

<div class="container">
  <div class="table-container" id="scrollContainer">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Telesale Name</th>
          <th>Branch</th>
          <th>Sales (%)</th>
          <th>Customer Orders</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="5">Loading data…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  Last updated: <span id="lastUpdated"></span><br>
  Designed and Managed by MIS.DPT
</footer>

<script src="config.js"></script>

<script>
const BASE_API =
  window.API_CONFIG.API_URL + "sales-person-performance";

const API_TOKEN = window.API_CONFIG.API_TOKEN;

const REFRESH_INTERVAL = 600000;
const PAGE_SWITCH_DELAY = 3000;

let pagesData = [];
let currentPageIndex = 0;

/* ================= AUTO SCROLL ================= */
let scrollInterval;

function startAutoScroll() {
  const c = document.getElementById("scrollContainer");
  clearInterval(scrollInterval);

  let direction = 1;
  let scrollTop = 0;

  if (c.scrollHeight <= c.clientHeight) return;

  scrollInterval = setInterval(() => {
    scrollTop += direction * 2;
    c.scrollTop = scrollTop;

    const reachedBottom = scrollTop >= c.scrollHeight - c.clientHeight;
    const reachedTop = scrollTop <= 0;

    if (pagesData.length <= 1) {
      // 🔁 ONLY ONE PAGE → bounce up & down forever
      if (reachedBottom) {
        direction = -1;
      } else if (reachedTop) {
        direction = 1;
      }
    } else {
      // 🔄 MULTIPLE PAGES → scroll down then switch
      if (reachedBottom) {
        clearInterval(scrollInterval);

        setTimeout(() => {
          switchPage();
        }, PAGE_SWITCH_DELAY);
      }
    }

  }, 30);
}

/* ================= FETCH ================= */
async function fetchPage(pageNum) {
  const response = await fetch(`${BASE_API}?pageNum=${pageNum}`, {
    headers: {
      "Authorization": API_TOKEN,
      "Content-Type": "application/json"
    }
  });

  if (!response.ok) throw new Error("HTTP " + response.status);

  return await response.json();
}

/* ================= LOAD ALL ================= */
async function loadAllPages() {
  try {
    pagesData = [];

    const firstResponse = await fetchPage(0);
    const pageCount = firstResponse.pageCount || 1;

    const processData = (data) => {
      return (data || [])
        .map(d => {
          let score = d.dailySalesScore;

          if (typeof score === "string") {
            score = score.replace("%", "");
          }

          score = Number(score);

          return { ...d, score };
        })
        .filter(d => !isNaN(d.score) && d.score > 0 && d.score <= 50)
        .sort((a, b) => b.score - a.score);
    };

    const firstFiltered = processData(firstResponse.data);
    if (firstFiltered.length > 0) {
      pagesData.push(firstFiltered);
    }

    for (let i = 1; i < pageCount; i++) {
      const res = await fetchPage(i);
      const filtered = processData(res.data);

      if (filtered.length > 0) {
        pagesData.push(filtered);
      }
    }

    const tbody = document.getElementById("tableBody");

    if (pagesData.length === 0) {
      tbody.innerHTML =
        `<tr><td colspan="5">No sales Data Available</td></tr>`;
      return;
    }

    currentPageIndex = 0;
    renderTable(pagesData[currentPageIndex]);

    document.getElementById("lastUpdated").textContent =
      new Date().toLocaleTimeString();

  } catch (err) {
    console.error(err);
    document.getElementById("tableBody").innerHTML =
      `<tr><td colspan="5">Failed to load data</td></tr>`;
  }
}

/* ================= RENDER ================= */
function renderTable(data) {
  const tbody = document.getElementById("tableBody");

  tbody.innerHTML = "";

  data.forEach((item, index) => {
    const sales = item.score;
    const conv  = Number(item.totalDaysCustomers);

    const cls =
      sales >= 40 ? "high" :
      sales >= 20 ? "medium" :
      "low";

    tbody.innerHTML += `
      <tr>
        <td class="rank">${index + 1}</td>
        <td>${item.salesPersonName}</td>
        <td>${item.branchName}</td>
        <td class="${cls}">${sales.toFixed(1)}%</td>
        <td>${conv}</td>
      </tr>
    `;
  });

  document.getElementById("scrollContainer").scrollTop = 0;
  startAutoScroll();
}

/* ================= SWITCH PAGE ================= */
function switchPage() {
  // ✅ Disable switching if only 1 page
  if (pagesData.length <= 1) return;

  currentPageIndex =
    (currentPageIndex + 1) % pagesData.length;

  renderTable(pagesData[currentPageIndex]);
}

/* ================= INIT ================= */
loadAllPages();
setInterval(loadAllPages, REFRESH_INTERVAL);
</script>

</body>
</html>
