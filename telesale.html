};

const displayName = branchId
    ? (branchNames[branchId] || branchId)
    : "All Branches";

document.querySelector("header").textContent =
    `Live Telesales Performance — ${displayName}`;

let BASE_API =
`${window.API_CONFIG.API_URL}sales-person-performance?pageSize=500&endDate=${formattedEnd}`;

if (branchId) {
    BASE_API += `&orgBranchId=${branchId}`;
}

const API_TOKEN = window.API_CONFIG.API_TOKEN;

/* ================= AUTO SCROLL ================= */

function startAutoScroll() {
  const c = document.getElementById("scrollContainer");
  clearInterval(scrollInterval);

  let direction = 1;
  let scrollTop = 0;
  let isPaused = false;

  if (c.scrollHeight <= c.clientHeight) return;

  scrollInterval = setInterval(() => {
    if (isPaused) return;

    scrollTop += direction * 2;
    c.scrollTop = scrollTop;

    const reachedBottom = scrollTop >= c.scrollHeight - c.clientHeight;
    const reachedTop = scrollTop <= 0;

    if (reachedBottom && direction === 1) {
      scrollTop = c.scrollHeight - c.clientHeight;
      isPaused = true;
      setTimeout(() => {
        direction = -1;
        isPaused = false;
      }, 6000);
    }

    if (reachedTop && direction === -1) {
      scrollTop = 0;
      isPaused = true;
      setTimeout(() => {
        direction = 1;
        isPaused = false;
      }, 6000);
    }

  }, 30);
}

/* ================= FETCH ================= */
async function fetchPage(pageNum) {
  const response = await fetch(`${BASE_API}&pageNum=${pageNum}`, {
    headers: {
      "Authorization": API_TOKEN,
      "Content-Type": "application/json"
    }
  });

  if (!response.ok) {
    throw new Error("HTTP " + response.status);
  }

  return await response.json();
}

/* ================= LOAD ALL DATA ================= */
async function loadAllPages() {
  try {
    let allData = [];

    const firstResponse = await fetchPage(0);
    const pageCount = firstResponse.pageCount || 1;
    allData.push(...(firstResponse.data || []));

    const promises = [];
    for (let i = 1; i < pageCount; i++) {
      promises.push(fetchPage(i));
    }

    const responses = await Promise.all(promises);
    responses.forEach(res => {
      allData.push(...(res.data || []));
    });

    // Calculate Branch Performance only
    const totalNetSales = allData.reduce(
        (sum, r) => sum + Number(r.netDailySales || 0),
        0
    );

    const branchName = allData.length
        ? allData[0].branchName
        : displayName;

    const target = branchTargets[branchName] || 0;
    const performance = target > 0 ? (totalNetSales / target) * 100 : 0;

    // Color class based on performance level
    const perfClass =
        performance >= 80 ? "perf-high" :
        performance >= 50 ? "perf-medium" :
        "perf-low";

    document.getElementById("branchStats").innerHTML = `
        <span class="perf-label">Branch Performance</span>
        <span class="perf-value ${perfClass}">${performance.toFixed(1)}%</span>
    `;

    /* ================= PROCESS ================= */
    const processed = allData
      .map(d => {
        let score = d.dailySalesScore;
        if (typeof score === "string") {
          score = score.replace("%", "");
        }
        score = Number(score);
        return { ...d, score };
      })
      .filter(d => !isNaN(d.score) && d.score > 0)
      .sort((a, b) => b.score - a.score);

    renderTable(processed);

    document.getElementById("lastUpdated").textContent =
      new Date().toLocaleTimeString();

  } catch (err) {
    console.error(err);
    document.getElementById("tableBody").innerHTML =
      `<tr><td colspan="5">Failed to load data</td></tr>`;
  }
}

/* ================= RENDER ================= */
function renderTable(data) {
  const tbody = document.getElementById("tableBody");

  if (!data.length) {
    tbody.innerHTML =
      `<tr><td colspan="5">No sales Data Available</td></tr>`;
    return;
  }

  tbody.innerHTML = "";

  data.forEach((item, index) => {
    const sales = item.score;
    const orders = Number(item.totalDaysCustomers || 0);
    const cls =
      sales >= 80 ? "high" :
      sales >= 50 ? "medium" :
      "low";

    tbody.innerHTML += `
      <tr>
        <td class="rank">${index + 1}</td>
        <td>${item.salesPersonName}</td>
        <td>${item.branchName}</td>
        <td class="${cls}">
          ${sales.toFixed(1)}%
        </td>
        <td>${orders}</td>
      </tr>
    `;
  });

  document.getElementById("scrollContainer").scrollTop = 0;
  startAutoScroll();
}

/* ================= INIT ================= */
loadAllPages();
setInterval(loadAllPages, 60000);
</script>
