<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Performance Less Than 50%</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    font-weight: bold;
    background: #0f172a;
    color: #e5e7eb;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px;
    text-align: center;
    font-size: 28px;
    background: #ba9305;
    color: #020617;
    flex-shrink: 0;
  }

  .container {
    flex: 1;
    padding: 0 20px;
    overflow: hidden;
  }

  .table-container {
    height: 100%;
    overflow-y: auto;
    scrollbar-width: none;
  }

  .table-container::-webkit-scrollbar {
    display: none;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 24px;
  }

  thead th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #1e293b;
    color: #93c5fd;
    text-transform: uppercase;
    font-size: 15px;
    letter-spacing: 1px;
  }

  th, td {
    padding: 14px;
    text-align: left;
    border-bottom: 1px solid #334155;
  }

  tbody tr:nth-child(even) {
    background: #020617;
  }

  tbody tr:hover {
    background: #1e293b;
  }

  /* Updated color logic for <= 50% */
  .high { color: #2563eb; }   /* ≥40% */
  .medium { color: #facc15; } /* ≥20% */
  .low { color: #ef4444; }    /* <20% */

  .rank {
    color: #38bdf8;
    font-weight: bold;
    width: 60px;
  }

  footer {
    text-align: center;
    padding: 10px;
    font-size: 14px;
    background: #f8fafc;
    color: #020617;
    flex-shrink: 0;
  }
</style>
</head>

<body>

<header>
 Tellesales Performance Less Than 50%
</header>

<div class="container">
  <div class="table-container" id="scrollContainer">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Telesale Name</th>
          <th>Branch</th>
          <th>Sales (%)</th>
          <th>Customer Orders</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="5">Loading data…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer>
  Last updated: <span id="lastUpdated"></span><br>
  Designed and Managed by MIS.DPT
</footer>

<script src="config.js"></script>

<script>
const BASE_API =
  window.API_CONFIG.API_URL + "sales-person-performance";

const API_TOKEN = window.API_CONFIG.API_TOKEN;

const REFRESH_INTERVAL = 600000; // 10 min
const PAGE_SWITCH_DELAY = 3000;  // pause at bottom before switching

let pagesData = [];
let currentPageIndex = 0;

/* ================= AUTO SCROLL ================= */
let scrollInterval;

function startAutoScroll() {
  const c = document.getElementById("scrollContainer");
  clearInterval(scrollInterval);

  let direction = 1;
  let scrollTop = 0;

  if (c.scrollHeight <= c.clientHeight) return;

  scrollInterval = setInterval(() => {
    scrollTop += direction * 2;
    c.scrollTop = scrollTop;

    // When reaching bottom → pause → switch page
    if (scrollTop >= c.scrollHeight - c.clientHeight) {
      clearInterval(scrollInterval);

      setTimeout(() => {
        switchPage();
      }, PAGE_SWITCH_DELAY);
    }

  }, 40);
}

/* ================= FETCH PAGE ================= */
async function fetchPage(pageNum) {
  const response = await fetch(`${BASE_API}?pageNum=${pageNum}`, {
    headers: {
      "Authorization": API_TOKEN,
      "Content-Type": "application/json"
    }
  });

  if (!response.ok) throw new Error("HTTP " + response.status);

  return await response.json();
}

/* ================= LOAD ALL PAGES ================= */
async function loadAllPages() {
  try {
    pagesData = [];

    // Get first page (to read pageCount)
    const firstResponse = await fetchPage(0);
    const pageCount = firstResponse.pageCount || 1;

    pagesData.push(firstResponse.data || []);

    // Fetch remaining pages dynamically
    for (let i = 1; i < pageCount; i++) {
      const res = await fetchPage(i);
      pagesData.push(res.data || []);
    }

    currentPageIndex = 0;
    renderTable(pagesData[currentPageIndex]);

    document.getElementById("lastUpdated").textContent =
      new Date().toLocaleTimeString();

  } catch (err) {
    console.error(err);
    document.getElementById("tableBody").innerHTML =
      `<tr><td colspan="5">Failed to load data</td></tr>`;
  }
}

/* ================= RENDER ================= */
function renderTable(data) {
  const tbody = document.getElementById("tableBody");

  const filtered = data
    .filter(d => {
      const score = Number(d.dailySalesScore);
      return score >= 1 && score <= 50;
    })
    .sort((a, b) => Number(b.dailySalesScore) - Number(a.dailySalesScore));

  tbody.innerHTML = "";

  if (filtered.length === 0) {
    tbody.innerHTML =
      `<tr><td colspan="5">No sales Data Available</td></tr>`;
    return;
  }

  filtered.forEach((item, index) => {
    const sales = Number(item.dailySalesScore);
    const conv  = Number(item.totalDaysCustomers);

    const cls =
      sales >= 40 ? "high" :
      sales >= 20 ? "medium" :
      "low";

    tbody.innerHTML += `
      <tr>
        <td class="rank">${index + 1}</td>
        <td>${item.salesPersonName}</td>
        <td>${item.branchName}</td>
        <td class="${cls}">${sales.toFixed(1)}%</td>
        <td>${conv}</td>
      </tr>
    `;
  });

  // Reset scroll to top before starting
  document.getElementById("scrollContainer").scrollTop = 0;

  startAutoScroll();
}

/* ================= SWITCH PAGE ================= */
function switchPage() {
  currentPageIndex =
    (currentPageIndex + 1) % pagesData.length;

  renderTable(pagesData[currentPageIndex]);
}

/* ================= INIT ================= */
loadAllPages();
setInterval(loadAllPages, REFRESH_INTERVAL);
</script>

</body>
</html>
