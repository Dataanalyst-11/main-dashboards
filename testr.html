<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Performance Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
  }

  header {
    background: #1e3a8a;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }

  .container {
    padding: 15px;
  }

  .kpi-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
  }

  .kpi {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .kpi h3 {
    margin: 0;
    font-size: 14px;
    color: #555;
  }

  .kpi p {
    font-size: 20px;
    margin: 5px 0 0;
    font-weight: bold;
  }

  .section {
    margin-top: 20px;
    background: white;
    padding: 15px;
    border-radius: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 8px;
    text-align: left;
    font-size: 13px;
  }

  th {
    background: #1e3a8a;
    color: white;
  }

  tr:nth-child(even) {
    background: #f2f2f2;
  }

  .high { background-color: #d1fae5; }
  .medium { background-color: #fef3c7; }
  .low { background-color: #fee2e2; }

</style>
</head>

<body>

<header>Sales Performance Dashboard</header>

<div class="container">

  <!-- KPI SECTION -->
  <div class="kpi-container">
    <div class="kpi">
      <h3>Total Revenue</h3>
      <p id="totalRevenue">0</p>
    </div>
    <div class="kpi">
      <h3>Total Orders</h3>
      <p id="totalOrders">0</p>
    </div>
    <div class="kpi">
      <h3>Avg Order Value</h3>
      <p id="avgOrder">0</p>
    </div>
    <div class="kpi">
      <h3>Top Route</h3>
      <p id="topRoute">-</p>
    </div>
  </div>

  <!-- ROUTE TABLE -->
  <div class="section">
    <h3>Route Performance</h3>
    <table id="routeTable">
      <thead>
        <tr>
          <th>Route</th>
          <th>Total Revenue</th>
          <th>Orders</th>
          <th>Avg Value</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- CUSTOMER TABLE -->
  <div class="section">
    <h3>Top Customers</h3>
    <table id="customerTable">
      <thead>
        <tr>
          <th>Customer</th>
          <th>Total Revenue</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>

// 🔹 Replace this with your Apps Script URL later
const DATA_URL = "https://script.google.com/macros/s/AKfycbyS2BvNyoYG5YDT3r1a-TIzASc2McdOlDTKgtfAtDzTVNUFOne3bbp8EYc_y_D-_mlXPA/exec";

// Temporary sample structure
async function loadData() {
  // Replace fetch with real endpoint later
  const response = await fetch(DATA_URL + "?t=" + new Date().getTime());
  const data = await response.json();

  processData(data);
}

function processData(data) {

  let totalRevenue = 0;
  let orders = new Set();
  let routeMap = {};
  let customerMap = {};

  data.forEach(row => {
    let revenue = Number(row["Amount Including VAT"]) || 0;
    let route = row["Route"] || "Unknown";
    let customer = row["Customer Name"] || "Unknown";
    let doc = row["Document No."];

    totalRevenue += revenue;
    orders.add(doc);

    // Route aggregation
    if (!routeMap[route]) {
      routeMap[route] = { revenue: 0, orders: new Set() };
    }
    routeMap[route].revenue += revenue;
    routeMap[route].orders.add(doc);

    // Customer aggregation
    if (!customerMap[customer]) {
      customerMap[customer] = 0;
    }
    customerMap[customer] += revenue;
  });

  document.getElementById("totalRevenue").innerText = totalRevenue.toFixed(2);
  document.getElementById("totalOrders").innerText = orders.size;
  document.getElementById("avgOrder").innerText = (totalRevenue / orders.size).toFixed(2);

  // Route Table
  let routeBody = document.querySelector("#routeTable tbody");
  let topRoute = "";
  let maxRevenue = 0;

  Object.keys(routeMap).forEach(route => {
    let rev = routeMap[route].revenue;
    let ord = routeMap[route].orders.size;
    let avg = rev / ord;

    if (rev > maxRevenue) {
      maxRevenue = rev;
      topRoute = route;
    }

    let row = document.createElement("tr");

    if (avg > 10000) row.classList.add("high");
    else if (avg > 5000) row.classList.add("medium");
    else row.classList.add("low");

    row.innerHTML = `
      <td>${route}</td>
      <td>${rev.toFixed(2)}</td>
      <td>${ord}</td>
      <td>${avg.toFixed(2)}</td>
    `;

    routeBody.appendChild(row);
  });

  document.getElementById("topRoute").innerText = topRoute;

  // Customer Table (Top 10)
  let customerBody = document.querySelector("#customerTable tbody");

  Object.entries(customerMap)
    .sort((a,b) => b[1] - a[1])
    .slice(0,10)
    .forEach(([cust, rev]) => {
      let row = document.createElement("tr");
      row.innerHTML = `<td>${cust}</td><td>${rev.toFixed(2)}</td>`;
      customerBody.appendChild(row);
    });

}

// Call function
loadData();

</script>

</body>
</html>
